<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Stadt Land Vollpfosten PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --orange: #FF7000;
            --blue: #007AFF;
            --dark: #2C2C2C;
            --bg: #FFF3E8;
            --card-border: #FFFFFF;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; touch-action: none; 
            display: flex; flex-direction: column; align-items: center; height: 100vh; width: 100vw;
        }

        /* --- GAME AREA --- */
        #game-area {
            position: relative; width: 100%; height: 78vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- VIEW: GRID --- */
        .view-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px; width: 92%; max-height: 100%;
            overflow-y: auto; padding: 20px 0; align-content: start;
        }
        .view-grid .card {
            position: relative; width: 100%; aspect-ratio: 2 / 3;
            transform: none !important; margin: 0 auto;
        }
        /* Ecken im Grid ausblenden */
        .view-grid .corner { display: none; }
        .view-grid .center-text { font-size: clamp(30px, 8vw, 60px); }

        /* --- VIEW: FAN --- */
        .view-fan {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        .view-fan .card {
            position: absolute; width: clamp(140px, 35vw, 220px); aspect-ratio: 2 / 3;
            transform-origin: bottom center;
            box-shadow: -5px 0px 20px rgba(0,0,0,0.3);
        }
        .view-fan .center-text { font-size: clamp(50px, 12vw, 90px); } /* Noch größer im Fächer */

        /* --- DIE KARTE (Allgemein) --- */
        .card {
            background: var(--orange); color: white;
            border-radius: 15px; border: 6px solid var(--card-border);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; text-align: center; white-space: nowrap; /* Verhindert X/Y/Z Umbruch */
            transition: transform 0.2s ease-out, opacity 0.3s ease;
            user-select: none; touch-action: pan-y;
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 15%, transparent 15%);
            background-size: 30px 30px; z-index: 10;
        }

        /* Ecken */
        .corner {
            position: absolute; font-size: clamp(14px, 4vw, 20px); font-weight: bold;
        }
        .corner-top-left { top: 8px; left: 10px; }
        .corner-bottom-right { bottom: 8px; right: 10px; transform: rotate(180deg); }

        /* Abwurf-Animation */
        .swiped-up {
            transform: translateY(-100vh) scale(0.5) !important;
            opacity: 0; pointer-events: none;
        }

        /* --- KATEGORIE & AKTIONS OVERLAY --- */
        #category-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        #category-overlay.active { opacity: 1; pointer-events: all; }
        
        .overlay-title { color: white; margin-bottom: 20px; font-size: 22px; text-transform: uppercase; text-align: center; }
        
        /* Grid für Kategorien (2x2) */
        #cat-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px;
        }
        
        /* Kategorie Karte im Overlay */
        .cat-card {
            background: var(--orange); color: white;
            border-radius: 12px; border: 4px solid white;
            aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
            font-size: clamp(14px, 4vw, 20px); text-align: center; padding: 10px;
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 15%, transparent 15%);
            background-size: 20px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            white-space: normal; /* Hier ist Umbruch erlaubt */
        }

        /* Blaue Aktionskarte */
        .action-card {
            background: var(--blue); width: 90%; max-width: 350px; aspect-ratio: 3 / 4;
            font-size: clamp(20px, 6vw, 35px); display: none; /* Standardmäßig aus */
        }

        .overlay-controls {
            display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; margin-top: 30px;
        }
        .overlay-controls button {
            padding: 15px; border-radius: 10px; font-size: 18px; width: 100%; background: white; color: var(--dark); border: none; font-weight: bold;
        }
        .overlay-controls button.primary { background: var(--orange); color: white; }
        .overlay-controls button:active { transform: scale(0.95); }

        /* --- MAIN CONTROLS (Unten) --- */
        .controls {
            position: absolute; bottom: 2vh;
            display: flex; flex-wrap: wrap; gap: 10px;
            width: 95%; justify-content: center;
        }
        .controls button {
            padding: 12px 10px; border: none; border-radius: 10px;
            background: var(--dark); color: white; font-size: 14px; font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); flex: 1 1 22%; text-align: center;
        }
        .controls button:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div id="game-area" class="view-fan">
        </div>

    <div class="controls">
        <button id="btn-undo">↩ Zurück</button>
        <button id="btn-view">Ansicht</button>
        <button id="btn-cats">Kategorien</button>
        <button id="btn-draw">+1 Karte</button>
    </div>

    <div id="category-overlay">
        <div class="overlay-title" id="overlay-title">Wähle eine Kategorie</div>
        
        <div id="cat-grid">
            <div class="cat-card" id="cat-1"></div>
            <div class="cat-card" id="cat-2"></div>
            <div class="cat-card" id="cat-3"></div>
            <div class="cat-card" id="cat-4"></div>
        </div>

        <div class="cat-card action-card" id="action-card-view">
            Tauscht eure Handys im Uhrzeigersinn!
        </div>

        <div class="overlay-controls">
            <button id="btn-new-cats">Neue ziehen</button>
            <button class="primary" id="btn-close-cats">Weiter / Zum Spiel</button>
        </div>
    </div>

    <script>
        const lettersPool = ["A","B","D","E","F","G","H","I / V","J / C","K","L","M","N","O","P","Q","R","S","Sch / W","T","U","X / Y / Z"];
        
        // Aktionskarten Pool
        const actionCards = [
            "Tauscht eure Karten (Handys) im Uhrzeigersinn",
            "Der Spieler links von dir zieht 2 extra Karten",
            "Tausche dein Handy mit dem, der die wenigsten Karten hat",
            "Tausch dein Handy mit dem, der die meisten Karten hat"
        ];

        // Gekürzte Liste fürs Beispiel (ersetze dies mit deiner langen Liste!)
        const categoriesPool = [
            "Gesellschaftsspiel", "Figur aus der Bibel", "Buchtitel", "Filmtitel", "Küchengerät", "Ein Politiker", "Farbe", "Sportart", "Tier", "Automarke", "Sportutensil", "Getränk", "Schulfach", "Computerspiel", "Süßigkeit"
        ];

        let hand = [];
        let discarded = [];
        let currentView = 'fan'; // Startet als Fächer
        let topZIndex = 100; // Variable, um angetippte Karten nach vorne zu holen

        const gameArea = document.getElementById('game-area');
        const viewBtn = document.getElementById('btn-view');
        const categoryOverlay = document.getElementById('category-overlay');

        function initHand() {
            for(let i=0; i<6; i++) hand.push(getRandomLetter());
            renderCards();
        }

        function getRandomLetter() { return lettersPool[Math.floor(Math.random() * lettersPool.length)]; }

        function renderCards() {
            gameArea.innerHTML = '';
            
            // Fächer-Berechnung: Dynamischer Winkel, damit sie nicht aus dem Bildschirm ragen
            let maxTotalAngle = 90; // Maximaler Winkel des kompletten Fächers
            let angleStep = hand.length > 1 ? Math.min(18, maxTotalAngle / (hand.length - 1)) : 0;

            hand.forEach((letter, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let cornerLetter = letter.split('/')[0].trim();

                card.innerHTML = `
                    <div class="corner corner-top-left">${cornerLetter}</div>
                    <div class="center-text">${letter}</div>
                    <div class="corner corner-bottom-right">${cornerLetter}</div>
                `;

                if (currentView === 'fan') {
                    let offset = index - (hand.length - 1) / 2;
                    let angle = offset * angleStep; 
                    let translateY = Math.abs(offset) * 8; // Leichter Bogen
                    card.style.transform = `rotate(${angle}deg) translateY(${translateY}px)`;
                    card.style.zIndex = topZIndex + index; // Initiale Sortierung
                }

                addCardLogic(card, index);
                gameArea.appendChild(card);
            });
            topZIndex += hand.length; // Vorbereiten für den nächsten Klick
        }

        viewBtn.addEventListener('click', () => {
            currentView = currentView === 'grid' ? 'fan' : 'grid';
            gameArea.className = currentView === 'grid' ? 'view-grid' : 'view-fan';
            renderCards();
        });

        function addCardLogic(card, cardIndex) {
            let startY = 0;
            let currentY = 0;
            let isSwiping = false;

            // Klick/Touch Start: Karte in den Vordergrund holen
            card.addEventListener('touchstart', (e) => {
                topZIndex++;
                card.style.zIndex = topZIndex;
                
                startY = e.touches[0].clientY;
                isSwiping = true;
                card.style.transition = 'none'; 
            }, {passive: true});

            card.addEventListener('touchmove', (e) => {
                if(!isSwiping) return;
                currentY = e.touches[0].clientY;
                let deltaY = currentY - startY;
                
                // Nur nach oben wischen
                if(deltaY < 0) {
                    let baseTransform = currentView === 'fan' ? card.style.transform.split(' translateY')[0] : '';
                    card.style.transform = `${baseTransform} translateY(${deltaY}px)`;
                }
            }, {passive: true});

            card.addEventListener('touchend', (e) => {
                if(!isSwiping) return;
                isSwiping = false;
                let deltaY = currentY - startY;
                card.style.transition = 'transform 0.2s ease-out, opacity 0.3s ease';

                // LÄNGERER SWIPE NÖTIG (-150 statt -80)
                if(deltaY < -150) {
                    card.classList.add('swiped-up');
                    if(navigator.vibrate) navigator.vibrate(50);
                    
                    setTimeout(() => {
                        discarded.push(hand[cardIndex]);
                        hand.splice(cardIndex, 1);
                        renderCards();
                        generateCategoriesOrAction(); // Öffne Kategorien nach Abwurf
                    }, 200);
                } else {
                    renderCards(); // Karte schnipst zurück
                }
            });
        }

        // --- KATEGORIE & AKTIONS LOGIK ---
        function generateCategoriesOrAction() {
            const catGrid = document.getElementById('cat-grid');
            const actionView = document.getElementById('action-card-view');
            const title = document.getElementById('overlay-title');

            // 15% Chance auf eine Aktionskarte statt Kategorien
            if(Math.random() < 0.15) {
                catGrid.style.display = 'none';
                actionView.style.display = 'flex';
                title.innerText = "Aktionskarte!";
                
                let randomAction = actionCards[Math.floor(Math.random() * actionCards.length)];
                actionView.innerText = randomAction;
            } else {
                catGrid.style.display = 'grid';
                actionView.style.display = 'none';
                title.innerText = "Wähle eine Kategorie";

                let shuffled = categoriesPool.sort(() => 0.5 - Math.random());
                document.getElementById('cat-1').innerText = shuffled[0];
                document.getElementById('cat-2').innerText = shuffled[1];
                document.getElementById('cat-3').innerText = shuffled[2];
                document.getElementById('cat-4').innerText = shuffled[3];
            }
            categoryOverlay.classList.add('active');
        }

        // Menü Buttons (Kategorien)
        document.getElementById('btn-cats').addEventListener('click', generateCategoriesOrAction);
        
        document.getElementById('btn-new-cats').addEventListener('click', generateCategoriesOrAction);
        
        document.getElementById('btn-close-cats').addEventListener('click', () => {
            categoryOverlay.classList.remove('active');
        });

        // --- MAIN BUTTONS ---
        document.getElementById('btn-undo').addEventListener('click', () => {
            if(discarded.length > 0) {
                hand.push(discarded.pop());
                renderCards();
            }
        });

        document.getElementById('btn-draw').addEventListener('click', () => {
            hand.push(getRandomLetter());
            renderCards();
            if(currentView === 'grid') setTimeout(() => gameArea.scrollTop = gameArea.scrollHeight, 100);
        });

        initHand();
    </script>
</body>
</html>
